name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run typecheck

    - name: Run Tests
      run: npm test

    - name: Dry Run Build
      run: npm run build
      env:
        # Since this is a production build step, ensure environment variables
        # required for the build (like Next.js build-time vars) are stubbed here if needed.
        NEXT_TELEMETRY_DISABLED: 1
